name: Bug report
description: Report a reproducible AutoRouter defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never include API keys, bearer tokens, full request bodies, or personally identifying paths."
  - type: input
    id: version
    attributes:
      label: AutoRouter version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted logs
    validations:
      required: true
